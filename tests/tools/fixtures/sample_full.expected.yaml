- id: dira_shabat_sample_0001
  alias: '[Sample · En Casa] Spots Sala → ON @ 18:00'
  trigger:
  - platform: time
    at: '18:00:00'
  condition:
  - condition: state
    entity_id: binary_sensor.dira_shabat_erev_shabbat_hag
    state: 'on'
  action:
  - service: light.turn_on
    target:
      entity_id: light.sala_spots
    data:
      brightness_pct: 100
  mode: single
- id: dira_shabat_sample_0002
  alias: '[Sample · En Casa] A/C Sala → 22 @ 18:30'
  trigger:
  - platform: time
    at: '18:30:00'
  condition:
  - condition: state
    entity_id: binary_sensor.dira_shabat_erev_shabbat_hag
    state: 'on'
  action:
  - service: climate.set_temperature
    target:
      entity_id: climate.sala_ac
    data:
      temperature: 22
  mode: single
- id: dira_shabat_sample_0003
  alias: '[Sample · En Casa] Luz Cocina → ON @ 19:00'
  trigger:
  - platform: time
    at: '19:00:00'
  condition:
  - condition: state
    entity_id: binary_sensor.dira_shabat_issur_melacha
    state: 'on'
  - condition: or
    conditions:
    - condition: state
      entity_id: binary_sensor.dira_shabat_dinner_today
      state: 'on'
    - condition: state
      entity_id: binary_sensor.dira_shabat_lunch_today
      state: 'on'
  action:
  - service: light.turn_on
    target:
      entity_id: light.cocina_main
    data:
      brightness_pct: 100
  mode: single
